<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aDrama Clone - Real Series</title>
    <style>
        body { background-color: #141414; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #E50914; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #E50914; margin: 0; font-size: 28px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 250px; background: #333; color: white; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); }
        
        .poster-placeholder { width: 100%; height: 280px; display: flex; justify-content: center; align-items: center; font-size: 50px; background: linear-gradient(45deg, #2b2b2b, #1f1f1f); }
        
        .card-info { padding: 15px; background: #1c1c1c; flex-grow: 1; }
        .card-title { font-weight: bold; margin-bottom: 8px; font-size: 16px; color: #fff; line-height: 1.3; }
        .card-meta { font-size: 13px; color: #e50914; font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 10; }
        .modal-content { width: 85%; max-width: 850px; background: #000; border-radius: 8px; position: relative; }
        .close-btn { position: absolute; top: -40px; right: 0; font-size: 30px; color: white; cursor: pointer; }
        
        iframe { width: 100%; height: 480px; border: none; border-radius: 8px; background: #000; }
    </style>
</head>
<body>

    <header>
        <h1>aDrama Local</h1>
        <input type="text" id="search" placeholder="Поиск дорамы..." oninput="searchDrama()">
    </header>

    <div class="grid" id="catalog"></div>

    <div class="modal" id="playerModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        <div id="episodeButtons" style="margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;"></div>
    </div>

<script>
// Наш идеальный массив дорам со списками серий
const dramas = [
  {
    id: 1,
    title: "Истинная красота (Серия 1)",
    year: "2020",
    country: "Южная Корея",
    emoji: "💄",
    episodes: [
      "https://rutube.ru/video/c9dfb2401624d8d22f751d8623ce9ca5/",
      "https://rutube.ru/video/14c581f8fc3fb00ed233b8e19c3a81da/",
      "https://rutube.ru/video/622060ca338b3a1149ebeb8af0d68edb/"
    ]
  },
  {
    id: 2,
    title: "Алхимия душ (Серия 1)",
    year: "2022",
    country: "Южная Корея",
    emoji: "🔮",
    episodes: [
      "https://rutube.ru/video/a806f2e99f9fd239b24275b3f0acb1f9/"
    ]
  },
  {
    id: 3,
    title: "Потомки солнца (Серия 1)",
    year: "2016",
    country: "Южная Корея",
    emoji: "☀️",
    episodes: [
      "https://rutube.ru/video/a806f2e99f9fd239b24275b3f0acb1f9/"
    ]
  }, // <-- Вот теперь эта запятая отделяет третью дораму от четвертой!
  {
    id: 4,
    title: "(поезд в пусан)",
    year: "2016",
    country: "Южная Корея",
    emoji: "🔮",
    episodes: [
      "https://rutube.ru/video/875d239a86e6211c1ba8397adc0ea3f6/"
    ]
  },
 {
    id: 5,
    title: "акула начало",
    year: "2021",
    country: "Южная Корея",
    poster: https://i.ytimg.com/vi/sanQyfNr-84/maxresdefault.jpg
    episodes: [
      "https://rutube.ru/video/dfa206856673dcff546fc58458b87096/"
    ]
    }
    ];

const catalog = document.getElementById('catalog');

// Функция отрисовки карточек дорам на главном экране
function renderDramas(list) {
    catalog.innerHTML = '';
    if (list.length === 0) {
        catalog.innerHTML = '<p>Ничего не найдено :(</p>';
        return;
    }

    list.forEach(function(drama) {
        var html = '<div class="card" onclick="openPlayer(' + drama.id + ')">';
        html += '<div class="poster-placeholder">' + drama.emoji + '</div>';
        html += '<div class="card-info">';
        html += '<div class="card-title">' + drama.title + '</div>';
        html += '<div class="card-meta">' + drama.year + ' | ' + drama.country + '</div>';
        html += '</div>';
        html += '</div>';
        catalog.innerHTML += html;
    });
}

// Показываем дорамы при первой загрузке страницы
renderDramas(dramas);

// Функция живого поиска по названию
function searchDrama() {
    const query = document.getElementById('search').value.toLowerCase();
    const filtered = dramas.filter(function(d) {
        return d.title.toLowerCase().indexOf(query) !== -1;
    });
    renderDramas(filtered);
}

let currentDramaEpisodes = [];

// Функция открытия плеера и автоматического создания кнопок серий
function openPlayer(dramaId) {
    const drama = dramas.find(function(d) { return d.id === dramaId; });
    if (!drama ||  !drama.episodes  ||  drama.episodes.length === 0) return;

    currentDramaEpisodes = drama.episodes;
    
    const buttonsContainer = document.getElementById('episodeButtons');
    if (buttonsContainer) {
        buttonsContainer.innerHTML = '';

        currentDramaEpisodes.forEach(function(url, index) {
            const btn = document.createElement('button');
            btn.innerText = 'Серия ' + (index + 1);
            
            // Стильное оформление кнопок серий в стиле Netflix
            btn.style.padding = '8px 16px';
            btn.style.background = index === 0 ? '#e50914' : '#333';
            btn.style.color = '#fff';
            btn.style.border = 'none';
            btn.style.borderRadius = '4px';
            btn.style.cursor = 'pointer';
            btn.style.fontWeight = 'bold';
            btn.style.margin = '5px';

            btn.onclick = function() {
                const allButtons = buttonsContainer.querySelectorAll('button');
                allButtons.forEach(function(b) { b.style.background = '#333'; });
                btn.style.background = '#e50914';
                changeEpisode(url);
            };

            buttonsContainer.appendChild(btn);
        });
    }

    changeEpisode(currentDramaEpisodes[0]);
    document.getElementById('playerModal').style.display = 'flex';
}

// Функция подмены ссылки для корректного отображения Rutube во фрейме
function changeEpisode(url) {
    let finalUrl = url;
    if (url.includes('rutube.ru/video/')) {
        finalUrl = url.replace('rutube.ru/video/', 'rutube.ru/play/embed/');
    }
    document.getElementById('videoPlayer').src = finalUrl;
}

// Функция закрытия плеера и очистки ресурсов
function closePlayer() {
    document.getElementById('playerModal').style.display = 'none';
    document.getElementById('videoPlayer').src = '';
    const buttonsContainer = document.getElementById('episodeButtons');
    if (buttonsContainer) {
        buttonsContainer.innerHTML = '';
    }
}
</script>
</body>
</html>
