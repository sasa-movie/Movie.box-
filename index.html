<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="yandex-verification" content="5d3162ade9af2ba5">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Фильмы Онлайн в Казахстане</title>
    <style>
        /* Стильный темный дизайн сайта */
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            color: #e50914; /* Красный акцент */
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        /* Сетка для карточек фильмов */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        /* Стили самой карточки */
        .movie-card {
            background-color: #242424;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .movie-title {
            color: #fff;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.4rem;
        }
        .movie-info {
            font-size: 0.9rem;
            color: #aaaaaa;
            margin-bottom: 15px;
        }
        .movie-info strong {
            color: #e50914;
        }
        /* Адаптивный плеер 16:9 */
        .player-box {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            margin-top: auto; /* Прижимает плеер к низу карточки */
        }
        .player-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Movie Box — Фильмы Онлайн</h1>
        
        <div class="movies-grid">

            <!-- ================= ФИЛЬМ №1 (ОБРАЗЕЦ) ================= -->
            <div class="movie-card">
                <h2 class="movie-title">Крминальный город 1</h2>
                <div class="movie-info">
                    <p><strong>Жанр:</strong> Боевик, Криминал</p>
                    <p><strong>Год:</strong> 2019</p>
                    <p><strong>Описание:</strong> Короткое описание сюжета вашего первого фильма для зрителей.</p>
                </div>
                <div class="player-box">
                    <!-- Замените ссылку в src на свою, когда найдете плеер фильма -->
                    <iframe width="720" height="405" src="https://rutube.ru/play/embed/14ac088c56187fd8052ec4daa6331493/" style="border: none;" allow="clipboard-write; autoplay" allowFullScreen></iframe>
                </div>
            </div>
            <!-- ================= КОНЕЦ ФИЛЬМА №1 ================= -->


            <!-- ================= ФИЛЬМ №2 (ОБРАЗЕЦ) ================= -->
            <div class="movie-card">
                <h2 class="movie-title">Криминальный город 2</h2>
                <div class="movie-info">
                    <p><strong>Жанр:</strong> боевик</p>
                    <p><strong>Год:</strong> 2021</p>
                    <p><strong>Описание:</strong> Сюда вы впишете описание для второго фильма вашего киносайта.</p>
                </div>
                <div class="player-box">
                    <!-- Замените ссылку в src на свою -->
                    <iframe width="720" height="405" src="https://rutube.ru/play/embed/abe5df684982d5b3b5e500828f9c2f48/" style="border: none;" allow="clipboard-write; autoplay" allowFullScreen></iframe>
            </div>
            <!-- ================= КОНЕЦ ФИЛЬМА №2 ================= -->

        </div>
    </div>

    <!-- ТУТ ВАШ СЧЕТЧИК ЯНДЕКС.МЕТРИКИ (ВСТАВЬТЕ ЕГО ДЛЯ НОВОГО САЙТА) -->

</body>
</html>
